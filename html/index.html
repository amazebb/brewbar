<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homebrew Packages</title>
</head>

<body>

    <h1>Homebrew Packages</h1>
    <p class="subtitle">Interactive package list from <a href="../Brewfile">Brewfile</a></p>

    <div class="stats">
        <span id="statTotal"></span>
        <span id="statFormula"></span>
        <span id="statCask"></span>
        <span id="statShowing"></span>
    </div>

    <div class="search-bar">
        <input type="text" id="nameSearch" placeholder="Search by name or description...">
    </div>

    <div class="table-wrap">
        <table id="pkgTable">
            <thead>
                <tr>
                    <th class="sortable" data-col="0">Name</th>
                    <th>
                        <span class="filter-wrap">
                            <button class="filter-btn" id="typeBtnEl">Type</button><span id="typeBadge"></span>
                            <div class="filter-dropdown" id="typeFilter">
                                <input class="filter-search" type="text" placeholder="Search...">
                                <div class="filter-options"></div>
                                <div class="filter-actions"><button class="sel-all">Show All</button><button
                                        class="clr-all">Clear All</button></div>
                            </div>
                        </span>
                    </th>
                    <th class="sortable" data-col="2">Description</th>
                    <th>
                        <span class="filter-wrap">
                            <button class="filter-btn" id="catBtnEl">Category</button><span id="catBadge"></span>
                            <div class="filter-dropdown" id="catFilter">
                                <input class="filter-search" type="text" placeholder="Search...">
                                <div class="filter-options"></div>
                                <div class="filter-actions"><button class="sel-all">Show All</button><button
                                        class="clr-all">Clear All</button></div>
                            </div>
                        </span>
                    </th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="no-results" id="noResults">No packages match the current filters.</div>

    <script src="app.js"></script>
</body>

</html>
