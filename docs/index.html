<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homebrew Packages</title>
</head>

<body>

    <h1>Homebrew Packages</h1>
    <div class="stats">
        <span id="statTotal"></span>
        <span id="statFormula"></span>
        <span id="statCask"></span>
        <span id="statShowing"></span>
    </div>

    <div class="search-bar">
        <input type="text" id="nameSearch" placeholder="Search by name or description...">
        <button id="exportBtn">Export CSV</button>
        <button id="brewBtn">Copy brew install</button>
    </div>

    <div class="table-wrap">
        <table id="pkgTable" data-col-name="Name,false" data-col-type="Type" data-col-desc="Description,false"
            data-col-cat="Category">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="no-results" id="noResults">No packages match the current filters.</div>

    <script type="module" src="app.js"></script>
</body>

</html>
